name: Build Geode Mod

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Geode mod for Android
        uses: geode-sdk/build-geode-mod@main
        id: build-android
        with:
          sdk: "latest"
          target: "Android64"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-outside-bro-android64
          path: ${{ steps.build-android.outputs.build-output }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Geode mod for Windows
        uses: geode-sdk/build-geode-mod@main
        id: build-win
        with:
          sdk: "latest"
          target: "Win64"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-outside-bro-win64
          path: ${{ steps.build-win.outputs.build-output }}

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: go-outside-bro-android64
          path: release-files/android

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: go-outside-bro-win64
          path: release-files/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/android/**
            release-files/windows/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
